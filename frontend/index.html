<!DOCTYPE html>
<html>
<head>
    <title>RSVP Speed Reader</title>
    <style>
        body {
            background: black;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        #reader {
            font-size: 70px;
            margin-top: 150px;
            font-weight: bold;
        }

        .orp {
            color: red;
        }

        #controls {
            margin-top: 40px;
        }

        input, button {
            margin: 10px;
            padding: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<h1>RSVP Speed Reader</h1>

<input type="file" id="pdfUpload" accept=".pdf">

<div id="reader">Upload a chapter</div>

<div id="controls">
    <input type="range" id="speedControl" min="100" max="1000" value="300">
    <span id="speedValue">300 WPM</span>
    <br>
    <button onclick="startReading()">Start</button>
    <button onclick="pauseReading()">Pause</button>
    <button onclick="restart()">Restart</button>
</div>

<script>
let words = [];
let index = 0;
let wpm = 300;
let isRunning = false;

// ==============================
// SPEED CONTROL
// ==============================
document.getElementById("speedControl").addEventListener("input", (e) => {
    wpm = parseInt(e.target.value);
    document.getElementById("speedValue").innerText = wpm + " WPM";
});

// ==============================
// FILE UPLOAD
// ==============================
document.getElementById("pdfUpload").addEventListener("change", async function() {
    const file = this.files[0];

    if (!file) return;

    document.getElementById("reader").innerText = "Processing...";

    const formData = new FormData();
    formData.append("file", file);

    try {
        const res = await fetch("http://127.0.0.1:5000/upload", {
            method: "POST",
            body: formData
        });

        words = await res.json();
        index = 0;

        document.getElementById("reader").innerText = "Ready";

        console.log("Words loaded:", words.length);

    } catch (err) {
        console.error(err);
        alert("Upload failed");
    }
});

// ==============================
// ORP LOGIC (center highlight)
// ==============================
function displayWord(word) {
    let mid = Math.floor(word.length / 2);
    let output = "";

    for (let i = 0; i < word.length; i++) {
        if (i === mid) {
            output += `<span class="orp">${word[i]}</span>`;
        } else {
            output += word[i];
        }
    }

    document.getElementById("reader").innerHTML = output;
}

// ==============================
// READING ENGINE
// ==============================
function startReading() {
    if (words.length === 0) {
        alert("Upload a PDF first!");
        return;
    }

    if (isRunning) return;
    isRunning = true;

    function loop() {
        if (!isRunning || index >= words.length) return;

        displayWord(words[index++]);

        let delay = 60000 / wpm;

        setTimeout(loop, delay);
    }

    loop();
}

// ==============================
// PAUSE
// ==============================
function pauseReading() {
    isRunning = false;
}

// ==============================
// RESTART
// ==============================
function restart() {
    index = 0;
}

// ==============================
// SPACEBAR CONTROL
// ==============================
document.addEventListener("keydown", function(e) {
    if (e.code === "Space") {
        e.preventDefault();

        if (isRunning) {
            pauseReading();
        } else {
            startReading();
        }
    }
});
</script>

</body>
</html>
