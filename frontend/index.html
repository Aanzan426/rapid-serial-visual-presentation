<!DOCTYPE html>
<html>
<head>
    <title>RSVP Speed Reader</title>
    <style>
        body {
            background: black;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        #reader {
    		font-size: 70px;
    		margin-top: 150px;
    		font-weight: bold;

    		display: flex;
    		justify-content: center;

    		font-family: monospace;

    		width: 100%;
	}

	.word-box {
    		display: grid;
    		grid-template-columns: repeat(15, 1ch); /* fixed width grid */
    		justify-content: center;
		align-items: center;
	}

	.char {
		display: inline-block;
    		width: 1ch;
    		text-align: center;
	}

        .orp {
            color: red;
        }

        #controls {
            margin-top: 40px;
        }

        input, button {
            margin: 10px;
            padding: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>

<h1>RSVP Speed Reader</h1>

<input type="file" id="pdfUpload" accept=".pdf">

<div id="reader">Upload a chapter</div>

<div id="controls">
    <input type="range" id="speedControl" min="100" max="1000" value="300">
    <span id="speedValue">300 WPM</span>
    <br>
    <button onclick="startReading()">Start</button>
    <button onclick="pauseReading()">Pause</button>
    <button onclick="restart()">Restart</button>
</div>

<script>
let words = [];
let index = 0;
let wpm = 300;
let isRunning = false;

// ==============================
// SPEED CONTROL
// ==============================
document.getElementById("speedControl").addEventListener("input", (e) => {
    wpm = parseInt(e.target.value);
    document.getElementById("speedValue").innerText = wpm + " WPM";
});

// ==============================
// FILE UPLOAD
// ==============================
document.getElementById("pdfUpload").addEventListener("change", async function() {
    const file = this.files[0];

    if (!file) return;

    document.getElementById("reader").innerText = "Processing...";

    const formData = new FormData();
    formData.append("file", file);

    try {
        const res = await fetch("http://127.0.0.1:5000/upload", {
            method: "POST",
            body: formData
        });

        words = await res.json();
        index = 0;

        document.getElementById("reader").innerText = "Ready";

        console.log("Words loaded:", words.length);

    } catch (err) {
        console.error(err);
        alert("Upload failed");
    }
});

// ==============================
// ORP LOGIC (center highlight)
// ==============================
function getORPIndex(word) {
    let len = word.length;

    if (len <= 1) return 0;
    if (len <= 5) return 1;
    if (len <= 9) return 2;
    if (len <= 13) return 3;
    return 4;
}

function displayWord(word) {
    const boxSize = 15;
    const anchor = Math.floor(boxSize / 2); // fixed center

    let chars = new Array(boxSize).fill(`<span class="char">&nbsp;</span>`);

    let orpIndex = getORPIndex(word);

    // 🔥 Place ORP at fixed anchor
    chars[anchor] = `<span class="orp char">${word[orpIndex]}</span>`;

    // 🔥 Fill LEFT side
    let leftPos = anchor - 1;
    for (let i = orpIndex - 1; i >= 0; i--) {
        if (leftPos < 0) break;
        chars[leftPos--] = `<span class="char">${word[i]}</span>`;
    }

    // 🔥 Fill RIGHT side
    let rightPos = anchor + 1;
    for (let i = orpIndex + 1; i < word.length; i++) {
        if (rightPos >= boxSize) break;
        chars[rightPos++] = `<span class="char">${word[i]}</span>`;
    }

    // Render
    document.getElementById("reader").innerHTML =
        `<div class="word-box">${chars.join("")}</div>`;
}

// ==============================
// READING ENGINE
// ==============================
function startReading() {
    if (words.length === 0) {
        alert("Upload a PDF first!");
        return;
    }

    if (isRunning) return;
    isRunning = true;

    function loop() {
        if (!isRunning || index >= words.length) return;

        displayWord(words[index++]);

        let delay = 60000 / wpm;

        setTimeout(loop, delay);
    }

    loop();
}

// ==============================
// PAUSE
// ==============================
function pauseReading() {
    isRunning = false;
}

// ==============================
// RESTART
// ==============================
function restart() {
    index = 0;
}

// ==============================
// SPACEBAR CONTROL
// ==============================
document.addEventListener("keydown", function(e) {
    if (e.code === "Space") {
        e.preventDefault();

        if (isRunning) {
            pauseReading();
        } else {
            startReading();
        }
    }
});
</script>

</body>
</html>
